<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Management System</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
body {
  background-image: url('register.jpg');
  background-size: cover;
  background-position: center;
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  border: 1px solid #ccc;
  border-radius: 10px;
  overflow: hidden;
}

thead th {
  background-color: rgb(0, 255, 132) !important;
  color: rgb(7, 7, 7);
  text-align: center;
  padding: 10px;
}

.card {
  background-color: rgba(255, 255, 255, 0.1);
  border: 1px solid black;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.9);
}

.form-control {
  background-color: rgba(255, 255, 255, 0.1);
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.9);
  border: 1px solid black;
  color: #fff;
}

#tableContainer {
  margin-bottom: 20px;
}

.btn {
  opacity: 0.9;
}

.btn:hover {
  opacity: 1;
}

#signInTime {
  color: #000000;
}

.form-check-label {
  color: rgb(249, 153, 7);
}

.cover-page {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background-color: rgba(0, 0, 0, 0.6);
  color: white;
}

.cover-page a {
  text-decoration: none;
  color: white;
  font-size: 20px;
  padding: 10px 20px;
  margin: 10px;
  border: 2px solid white;
  border-radius: 5px;
}

.cover-page a:hover {
  background-color: rgb(237, 148, 7);
  color: black;
}
</style>
</head>
<body>
<!-- Cover Page -->
<div class="cover-page" id="coverPage">
  <h1>Welcome to Attendance Management System</h1>
<p>Select an option to proceed</p>
  <a href="#" onclick="navigateTo('registrationContainer')">Go to Registration</a>
  <a href="#" onclick="navigateTo('loginContainer')">Go to Login</a>
</div>

<div class="container my-5 d-none">
<!-- Registration Form -->
<div id="registrationContainer" class="card mx-auto p-4" style="max-width: 400px;">
 <h2 class="text-center">Register</h2>
  <form id="registrationForm">
<div class="mb-3">
  <input type="text" id="registerUsername" class="form-control" placeholder="Username" required>
</div>
<div class="mb-3">
  <input type="email" id="registerEmail" class="form-control" placeholder="Email" required>
</div>
<div class="mb-3">
  <input type="tel" id="registerPhone" class="form-control" placeholder="Phone Number" pattern="[0-9]{10}" required>
</div>
<div class="mb-3">
  <input type="password" id="registerPassword" class="form-control" placeholder="Password" required>
</div>
<div class="mb-3">
  <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
</div>
<div class="mb-3 form-check">
  <input type="checkbox" id="termsCheckbox" class="form-check-input" required>
  <label for="termsCheckbox" class="form-check-label">I agree to the terms and conditions</label>
</div>
  <button type="submit" class="btn btn-primary w-30">Register</button>
</form>
</div>

<!-- Login Form -->
<div id="loginContainer" class="card mx-auto p-4 d-none" style="max-width: 400px;">
 <h2 class="text-center">Login</h2>
  <form id="loginForm">
<div class="mb-3">
  <input type="text" id="username" class="form-control" placeholder="Username" required>
</div>
<div class="mb-3">
  <input type="password" id="password" class="form-control" placeholder="Password" required>
</div>
  <button type="submit" class="btn btn-primary w-30">Login</button>
</form>
</div>

<!-- Worker Form -->
<div id="formContainer" class="card mx-auto p-4 mt-4 d-none" style="max-width: 600px;">
 <h2 class="text-center">Add Worker</h2>
  <form id="addWorkerForm">
<div class="row g-2">
<div class="col-md-6">
  <input type="text" id="firstName" name="firstName" class="form-control" placeholder="First Name" required>
</div>
<div class="col-md-6">
  <input type="text" id="lastName" name="lastName" class="form-control" placeholder="Last Name" required>
</div>
</div>
<div class="row g-2 mt-3">
<div class="col-md-6">
  <input type="email" id="email" name="email" class="form-control" placeholder="Email" required>
</div>
<div class="col-md-6">
  <input type="tel" id="phoneNumber" name="phoneNumber" class="form-control" placeholder="Phone Number" required>
</div>
</div>
<div class="row g-2 mt-3">
<div class="col-md-6">
  <input type="text" id="signInTime" name="signInTime" class="form-control" placeholder="Sign In Time" readonly>
</div>
<div class="col-md-6">
  <input type="text" id="signOutTime" name="signOutTime" class="form-control" placeholder="Sign Out Time" required>
</div>
</div>
  <button type="submit" class="btn btn-success w-40 mt-4">Add Worker</button>
</form>
</div>

<!-- Attendance Table -->
<div id="tableContainer" class="d-none">
<div class="d-flex justify-content-between align-items-center mb-3">
  <button class="btn btn-primary" onclick="goBackToForm()">Back to Input Form</button>
</div>
<table class="table table-striped mt-4">
  <h2 class="text-center">Attendance Table</h2>
<thead>
 <tr>
  <th>ID</th>
  <th>First Name</th>
  <th>Last Name</th>
  <th>Email</th>
  <th>Phone</th>
  <th>Date</th>
  <th>Sign In</th>
  <th>Sign Out</th>
  <th>Actions</th>
 </tr>
</thead>
  <tbody id="attendanceTableBody"></tbody>
</table>
</div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom Script -->
<script>
  const coverPage = document.getElementById('coverPage');
  const container = document.querySelector('.container');
  const registrationContainer = document.getElementById('registrationContainer');
  const loginContainer = document.getElementById('loginContainer');
  const formContainer = document.getElementById('formContainer');
  const tableContainer = document.getElementById('tableContainer');
  const attendanceTableBody = document.getElementById('attendanceTableBody');
  const signInTimeInput = document.getElementById('signInTime');
  let attendanceData = JSON.parse(localStorage.getItem('attendanceData')) || [];
  let idCounter = attendanceData.length ? Math.max(...attendanceData.map(worker => worker.id)) + 1 : 1;

// Function to navigate between sections
function navigateTo(sectionId) {
  coverPage.classList.add('d-none');
  container.classList.remove('d-none');
  registrationContainer.classList.add('d-none');
  loginContainer.classList.add('d-none');
  formContainer.classList.add('d-none');
  tableContainer.classList.add('d-none');
  document.getElementById(sectionId).classList.remove('d-none');
}

// Function to save data to localStorage
function saveToLocalStorage(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

// Function to get data from localStorage
function getFromLocalStorage(key) {
  const data = localStorage.getItem(key);
  return data ? JSON.parse(data) : [];
}

// Registration form submission logic
document.getElementById('registrationForm').addEventListener('submit', function (event) {
 event.preventDefault();
  alert("Registration Successful!");
  navigateTo('loginContainer');
});

// Login form submission logic
document.getElementById('loginForm').addEventListener('submit', function (event) {
  event.preventDefault();
  navigateTo('formContainer');
});

function getCurrentTime() {
  const now = new Date();
  let hours = now.getHours();
  const minutes = now.getMinutes().toString().padStart(2, '0');
  const ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12 || 12;
  return `${hours}:${minutes} ${ampm}`;
}

function getCurrentDate() {
  const now = new Date();
  const year = now.getFullYear();
  const month = (now.getMonth() + 1).toString().padStart(2, '0');
  const day = now.getDate().toString().padStart(2, '0');
  return `${day}-${month}-${year}`;
}

document.getElementById('registrationForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const username = document.getElementById('registerUsername').value.trim();
  const email = document.getElementById('registerEmail').value.trim();
  const password = document.getElementById('registerPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  if (password !== confirmPassword) {
   alert('Passwords do not match!');
   return;
}
const userData = { username, email, password };
  saveToLocalStorage('userData', userData);
  registrationContainer.classList.add('d-none');
  loginContainer.classList.remove('d-none');
});

document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const storedData = getFromLocalStorage('userData');
  if (storedData && storedData.username === username && storedData.password === password) {
   loginContainer.classList.add('d-none');
   formContainer.classList.remove('d-none');
   signInTimeInput.value = getCurrentTime();
} else {
  alert('Invalid username or password');
 }
});

document.getElementById('addWorkerForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const email = document.getElementById('email').value.trim();
  const phoneNumber = document.getElementById('phoneNumber').value.trim();
  const signInTime = signInTimeInput.value.trim();
  const signOutTime = document.getElementById('signOutTime').value.trim();

// Email validation
const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
   alert('Please enter a valid email address');
   return;
}

// Phone number validation
const phoneRegex = /^\d{10}$/;
  if (!phoneRegex.test(phoneNumber)) {
   alert('Please enter a valid 10-digit phone number');
   return;
}

const worker = { id: idCounter++, firstName, lastName, email, phoneNumber, date: getCurrentDate(), signInTime, signOutTime };
  attendanceData.push(worker);
  saveToLocalStorage('attendanceData', attendanceData);
  updateTable();
  formContainer.classList.add('d-none');
  tableContainer.classList.remove('d-none');
});

function updateTable() {
  attendanceTableBody.innerHTML = '';
  attendanceData.forEach((worker) => {
   const row = document.createElement('tr');
   row.innerHTML = `
  <td>${worker.id}</td>
  <td>${worker.firstName}</td>
  <td>${worker.lastName}</td>
  <td>${worker.email}</td>
  <td>${worker.phoneNumber}</td>
  <td>${worker.date}</td>
  <td contenteditable="true">${worker.signInTime}</td>
  <td contenteditable="true">${worker.signOutTime}</td>
<td>
  <button class="btn btn-success btn-sm" onclick="saveRow(${worker.id})">Save</button>
  <button class="btn btn-danger btn-sm" onclick="deleteWorker(${worker.id})">Delete</button>
</td>`;
  attendanceTableBody.appendChild(row);
 });
}

function saveRow(id) {
  const rows = Array.from(attendanceTableBody.children);
  const row = rows.find((row) => parseInt(row.cells[0].innerText) === id);
   if (!row) {
   alert('Error: Row not found!');
  return;
}

const email = row.cells[3].innerText.trim();
const phoneNumber = row.cells[4].innerText.trim();

// Email validation
const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
   alert('Please enter a valid email address');
   return;
}

// Phone number validation
  const phoneRegex = /^\d{10}$/;
  if (!phoneRegex.test(phoneNumber)) {
   alert('Please enter a valid 10-digit phone number');
   return;
}

const updatedWorker = {
  id,
  firstName: row.cells[1].innerText.trim(),
  lastName: row.cells[2].innerText.trim(),
  email,
  phoneNumber,
  date: row.cells[5].innerText.trim(),
  signInTime: row.cells[6].innerText.trim(),
  signOutTime: row.cells[7].innerText.trim()
};

const index = attendanceData.findIndex((worker) => worker.id === id);
  if (index !== -1) {
  attendanceData[index] = updatedWorker;
  saveToLocalStorage('attendanceData', attendanceData);
  alert('Row updated successfully!');
} else {
  alert('Error: Worker not found in data!');
 }
}

function deleteWorker(id) {
  attendanceData = attendanceData.filter((worker) => worker.id !== id);
  saveToLocalStorage('attendanceData', attendanceData);
  updateTable();
}

function goBackToForm() {
  tableContainer.classList.add('d-none');
  formContainer.classList.remove('d-none');
  document.getElementById('addWorkerForm').reset();
  signInTimeInput.value = getCurrentTime();
}

function saveToLocalStorage(key, data) {
  try {
  localStorage.setItem(key, JSON.stringify(data));
} catch (error) {
  console.error('Error saving to localStorage:', error);
 }
}

function getFromLocalStorage(key) {
 try {
  const data = localStorage.getItem(key);
   return data ? JSON.parse(data) : null;
} catch (error) {
  console.error('Error reading from localStorage:', error);
  return null;
 }
}

document.addEventListener('DOMContentLoaded', () => {
  updateTable();
});
</script>
</body>
</html>
