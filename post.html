<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CourierPro Modern Dashboard</title>

    <!-- Bootstrap / Font Awesome / jQuery -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #d71a28; /* DHL red */
        --accent: #fdd835; /* DHL yellow */
        --bg-dark: #0f172a;
        --bg-light: #f5f6fa;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: var(--bg-light);
        margin: 0;
        overflow-x: hidden;
      }

      /* Sidebar */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 250px;
        height: 100%;
        background: var(--bg-dark);
        color: #fff;
        transition: 0.3s;
        z-index: 1000;
      }
      .sidebar .brand {
        font-size: 1.6rem;
        font-weight: 700;
        text-align: center;
        padding: 1rem;
        color: var(--accent);
      }
      .sidebar a {
        display: flex;
        align-items: center;
        color: #cbd5e1;
        padding: 12px 25px;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s;
      }
      .sidebar a i {
        margin-right: 12px;
        font-size: 1.2rem;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .sidebar.collapsed {
        width: 70px;
      }
      .sidebar.collapsed a span {
        display: none;
      }

      /* Topbar */
      .topbar {
        margin-left: 250px;
        background: linear-gradient(90deg, var(--primary), #b5121f);
        padding: 15px 30px;
        color: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: 0.3s;
      }
      .topbar.collapsed {
        margin-left: 70px;
      }
      .topbar .user {
        display: flex;
        align-items: center;
      }
      .topbar .user img {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        margin-right: 10px;
      }

      /* Main content */
      .main-content {
        margin-left: 250px;
        padding: 30px;
        transition: 0.3s;
      }
      .main-content.collapsed {
        margin-left: 70px;
      }

      .section {
        display: none;
      }
      .section.active {
        display: block;
      }

      /* Shipment cards */
      .shipment-card {
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        padding: 20px;
        margin-bottom: 20px;
        transition: all 0.3s ease;
      }
      .shipment-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }
      .shipment-card h6 {
        font-weight: 600;
        margin-bottom: 8px;
      }
      .status {
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 0.8rem;
        font-weight: 600;
      }
      .status.created {
        background: #fff3cd;
        color: #856404;
      }
      .status.transit {
        background: #cce5ff;
        color: #004085;
      }
      .status.delivered {
        background: #d4edda;
        color: #155724;
      }

      /* Form box */
      .form-box {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      /* Buttons */
      .btn-primary {
        background: var(--primary);
        border: none;
      }
      .btn-primary:hover {
        background: #b5121f;
      }

      @media (max-width: 768px) {
        .sidebar {
          left: -250px;
        }
        .sidebar.show {
          left: 0;
        }
        .topbar {
          margin-left: 0;
        }
        .main-content {
          margin-left: 0;
          padding: 15px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-truck-fast me-2"></i>CourierPro
      </div>
      <a href="#" class="active" data-target="#dashboard"
        ><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a
      >
      <a href="#" data-target="#create"
        ><i class="fa-solid fa-plus"></i> <span>Create Shipment</span></a
      >
      <a href="#" data-target="#track"
        ><i class="fa-solid fa-location-crosshairs"></i>
        <span>Track Shipment</span></a
      >
      <a href="#" data-target="#profile"
        ><i class="fa-solid fa-user"></i> <span>Profile</span></a
      >
    </div>

    <!-- Topbar -->
    <div class="topbar">
      <i
        class="fa-solid fa-bars me-3 d-md-none toggle-sidebar"
        style="cursor: pointer"
      ></i>
      <h4>Dashboard</h4>
      <div class="user">
        <img src="https://i.pravatar.cc/40" alt="User" />
        <span>Aziz Rahman Noyan</span>
      </div>
    </div>

    <!-- Main content -->
    <div class="main-content">
      <!-- Dashboard -->
      <div id="dashboard" class="section active">
        <div class="row" id="shipments"></div>
      </div>

      <!-- Create Shipment -->
      <div id="create" class="section">
        <div class="form-box">
          <h4>Create New Shipment</h4>
          <form id="createForm">
            <div class="row mt-3">
              <div class="col-md-6">
                <label>Sender Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="senderName"
                  required
                />
              </div>
              <div class="col-md-6">
                <label>Receiver Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="receiverName"
                  required
                />
              </div>
            </div>
            <div class="row mt-3">
              <div class="col-md-6">
                <label>Weight (kg)</label>
                <input
                  type="number"
                  class="form-control"
                  id="weight"
                  required
                />
              </div>
              <div class="col-md-6">
                <label>Service Type</label>
                <select class="form-select" id="serviceType">
                  <option value="standard">Standard</option>
                  <option value="express">Express</option>
                  <option value="overnight">Overnight</option>
                </select>
              </div>
            </div>
            <div class="mt-4 text-end">
              <button class="btn btn-primary">
                <i class="fa-solid fa-paper-plane"></i> Create
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Track Shipment -->
      <div id="track" class="section">
        <div class="form-box">
          <h4>Track Shipment</h4>
          <div class="input-group">
            <input
              type="text"
              id="trackInput"
              class="form-control"
              placeholder="Enter tracking number..."
            />
            <button class="btn btn-primary" id="trackBtn">
              <i class="fa-solid fa-search"></i> Track
            </button>
          </div>
          <div id="trackResult" class="mt-4"></div>
        </div>
      </div>

      <!-- Profile -->
      <div id="profile" class="section">
        <div class="form-box">
          <h4>User Profile</h4>
          <p><strong>Name:</strong> Aziz Rahman Noyan</p>
          <p><strong>Role:</strong> Manager</p>
          <button class="btn btn-primary">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
          </button>
        </div>
      </div>
    </div>

    <script>
      $(function () {
        // Dummy shipments
        let shipments = [
          {
            id: 1,
            tracking: "CP1699000000",
            sender: "Alice",
            receiver: "Bob",
            weight: 5,
            service: "express",
            status: "created",
            date: "2025-11-03 12:00",
          },
          {
            id: 2,
            tracking: "CP1699000001",
            sender: "Charlie",
            receiver: "David",
            weight: 10,
            service: "standard",
            status: "transit",
            date: "2025-11-02 09:30",
          },
          {
            id: 3,
            tracking: "CP1699000002",
            sender: "Eve",
            receiver: "Frank",
            weight: 2,
            service: "overnight",
            status: "delivered",
            date: "2025-11-01 16:45",
          },
        ];

        // Sidebar nav
        $(".sidebar a").click(function (e) {
          e.preventDefault();
          $(".sidebar a").removeClass("active");
          $(this).addClass("active");
          const target = $(this).data("target");
          $(".section").removeClass("active");
          $(target).addClass("active");
        });

        // Create shipment
        $("#createForm").submit(function (e) {
          e.preventDefault();
          const shipment = {
            id: shipments.length + 1,
            tracking: "CP" + Date.now(),
            sender: $("#senderName").val(),
            receiver: $("#receiverName").val(),
            weight: $("#weight").val(),
            service: $("#serviceType").val(),
            status: "created",
            date: new Date().toLocaleString(),
          };
          shipments.push(shipment);
          showShipments();
          alert("Shipment created: " + shipment.tracking);
          this.reset();
          $('.sidebar a[data-target="#dashboard"]').click();
        });

        // Render shipments
        function showShipments() {
          let html = "";
          if (shipments.length === 0) {
            html = `<p class="text-muted">No shipments yet.</p>`;
          } else {
            shipments
              .slice()
              .reverse()
              .forEach((s) => {
                html += `
        <div class="col-md-4">
          <div class="shipment-card">
            <h6>${s.tracking}</h6>
            <p><strong>${s.sender}</strong> → ${s.receiver}</p>
            <p class="text-muted small">${s.date}</p>
            <span class="status ${s.status}">${s.status}</span> | <small>${s.service}</small>
          </div>
        </div>`;
              });
          }
          $("#shipments").html(html);
        }

        // Track
        $("#trackBtn").click(function () {
          const code = $("#trackInput").val().trim();
          const s = shipments.find((x) => x.tracking === code);
          if (!s) {
            $("#trackResult").html(
              `<p class="text-danger">No shipment found for ${code}</p>`
            );
            return;
          }
          $("#trackResult").html(`
      <div class="shipment-card">
        <h6>Tracking: ${s.tracking}</h6>
        <p><strong>Sender:</strong> ${s.sender}</p>
        <p><strong>Receiver:</strong> ${s.receiver}</p>
        <p><strong>Status:</strong> ${s.status}</p>
        <p><strong>Service:</strong> ${s.service}</p>
        <p><strong>Date:</strong> ${s.date}</p>
      </div>
    `);
        });

        // Toggle sidebar (mobile)
        $(".toggle-sidebar").click(function () {
          $(".sidebar").toggleClass("show");
        });

        showShipments();
      });
    </script>
  </body>
</html>
