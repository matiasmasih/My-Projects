{% extends "base.html" %}

{% block content %}
<style>
.admin-login-container {
    background: linear-gradient(135deg, #2C1810 0%, #1A0F0A 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.admin-login-card {
    background: white;
    border-radius: 32px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    max-width: 450px;
    width: 100%;
    overflow: hidden;
}
.admin-login-header {
    background: linear-gradient(135deg, #C67C4E, #A0522D);
    padding: 40px;
    text-align: center;
    color: white;
}
.admin-login-header i {
    font-size: 60px;
    color: #D4AF37;
    margin-bottom: 15px;
}
.admin-login-header h1 {
    font-size: 1.8rem;
    font-weight: 700;
}
.admin-login-body {
    padding: 40px;
}
.admin-login-footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid #eee;
    background: #f8f9fa;
}
.form-control-admin {
    border: 2px solid #E0E0E0;
    border-radius: 12px;
    padding: 12px 16px;
    width: 100%;
}
.btn-admin-login {
    background: linear-gradient(135deg, #C67C4E, #A0522D);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 50px;
    font-weight: 600;
    width: 100%;
}
</style>

<div class="admin-login-container">
    <div class="admin-login-card">
        <div class="admin-login-header">
            <i class="fas fa-user-shield"></i>
            <h1>Admin Portal</h1>
            <p>Restricted Access</p>
        </div>
        <div class="admin-login-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control-admin" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control-admin" required>
                </div>
                <button type="submit" class="btn-admin-login">
                    <i class="fas fa-sign-in-alt me-2"></i>{{ t("admin_login") }}
                </button>
            </form>
        </div>
        <div class="admin-login-footer">
            <a href="/admin-register" style="color: #C67C4E;">{{ t("register_admin_first") }}</a>
        </div>
    </div>
</div>
{% endblock %}
