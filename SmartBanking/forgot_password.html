<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartBank - Forgot Password</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(
            rgba(13, 27, 42, 0.75),
            rgba(41, 128, 185, 0.75)
          ),
          url("https://images.unsplash.com/photo-1601597111158-2fceff292cdc?auto=format&fit=crop&w=2070&q=80")
            no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #1e293b;
      }

      .reset-box {
        background: rgba(255, 255, 255, 0.95);
        padding: 2.5rem 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 420px;
        text-align: center;
      }

      .reset-box h2 {
        margin-bottom: 1.5rem;
        color: #1e293b;
      }

      .reset-box p {
        color: #475569;
        font-size: 0.95rem;
        margin-bottom: 1.5rem;
      }

      input[type="email"] {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #cbd5e1;
        outline: none;
        transition: 0.3s;
        font-family: "Poppins", sans-serif;
      }

      input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }

      button {
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 1rem;
        transition: 0.3s;
      }

      button:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
      }

      .back-link {
        display: block;
        margin-top: 1rem;
        text-decoration: none;
        color: #2563eb;
        font-weight: 500;
      }

      .message {
        display: none;
        background: #dcfce7;
        border: 1px solid #22c55e;
        color: #166534;
        padding: 10px;
        border-radius: 8px;
        margin-top: 1rem;
        font-size: 0.9rem;
      }
    </style>
  </head>

  <body>
    <div class="reset-box">
      <h2><i class="fas fa-key"></i> Forgot Password</h2>
      <p>
        Enter your registered email address below and we’ll send you
        instructions to reset your password.
      </p>

      <form id="resetForm">
        <input
          type="email"
          id="resetEmail"
          placeholder="Enter your email"
          required
        />
        <button type="submit">
          <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>
      </form>

      <div class="message" id="messageBox">
        ✅ A password reset link has been sent to your email address.
      </div>

      <a href="login.html" class="back-link"
        ><i class="fas fa-arrow-left"></i> Back to Login</a
      >
    </div>

    <script>
      document
        .getElementById("resetForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const email = document.getElementById("resetEmail").value.trim();
          const messageBox = document.getElementById("messageBox");

          if (email) {
            // Simulate sending reset link (you can connect PHP backend later)
            messageBox.style.display = "block";
            document.getElementById("resetForm").reset();

            // Optionally, auto-hide message after 5s
            setTimeout(() => {
              messageBox.style.display = "none";
            }, 5000);
          }
        });
    </script>
  </body>
</html>
